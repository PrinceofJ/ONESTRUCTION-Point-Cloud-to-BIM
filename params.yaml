# params.yaml - pipeline configuration
# Edit values here; notebooks read via scan2bim.load_config().
# Keys match Config field names. Sections are for readability only.

input:
  file_path: data/area1.xyz
  units_per_meter: 1.0

groundtruth:
  gt_dir: data/Area_3

output:
  out_root: scan2bim_out

raster:
  pixel_m: 0.03

watershed:
  min_coverage_frac: 0.25

slab:
  slab_lo_m: 0.1
  slab_hi_m: 0.2

walls:
  room_erode_m: 0.125
  wall_dilate_m: 0.15

sam:
  use_sam_recall: true
  sam_backend: sam2

wall_segmentation:
  normal_radius_m: 0.10
  normal_tol_deg: 15.0
  wseg_angle_tol_deg: 10.0
  offset_tol_m: 0.20
  min_wall_points: 200
  flat_pixel_m: 0.04

wall_processing:
  min_void_px: 40
  min_rectangularity: 0.55
  door_min_width_m: 0.50
  door_max_width_m: 1.80
  door_min_height_m: 1.80
  door_max_height_m: 2.80

ifc:
  ifc_min_directions: 2
  ifc_min_wall_length_m: 0.3
  ifc_default_thickness: 0.15
  ifc_project_name: Scanned Building
