# params.yaml - pipeline configuration
# Edit values here; notebooks read via scan2bim.load_config().
# Keys match Config field names. Sections are for readability only.

input:
  file_path: data\area1.xyz     # the real-life scan to SEGMENT (full cloud); pairs with gt_dir below
  units_per_meter: 1.0           # raw units per metre (1.0 if already in metres)

groundtruth:
  gt_dir: data/Area_1            # ground-truth model dir (per-room <room>/<room>.txt); same frame as the scan

output:
  out_root: scan2bim_out

raster:
  pixel_m: 0.03

watershed:
  min_coverage_frac: 0.25

slab:
  slab_lo_m: 0.1
  slab_hi_m: 0.2

walls:
  room_erode_m: 0.05            # boundary-ring erosion radius (= ring thickness)
  wall_dilate_m: 0.1            # how far the ring reaches out to grab wall pixels

sam:
  use_sam_recall: true
  sam_backend: sam2

wall_segmentation:
  normal_radius_m: 0.10
  normal_tol_deg: 15.0
  wseg_angle_tol_deg: 10.0
  offset_tol_m: 0.20
  min_wall_points: 200
  flat_pixel_m: 0.04

wall_processing:
  min_void_px: 40
  min_rectangularity: 0.55
  door_min_width_m: 0.50
  door_max_width_m: 1.80
  door_min_height_m: 1.80
  door_max_height_m: 2.80

ifc:
  ifc_min_directions: 2
  ifc_min_wall_length_m: 0.3
  ifc_default_thickness: 0.15
  ifc_project_name: Scanned Building

bsdd:
  bsdd_enrich: true
  bsdd_server_path: "/Users/jacksonmatsumura/Documents/ONESTRUCTION-Point-Cloud-to-BIM/bSDD-mcp/build/index.js"  
  bsdd_add_psets: true
  bsdd_add_qtos: true
  bsdd_add_classifications: true
  bsdd_validate_geometry: true

evaluation:                      # harmonized 3-method comparison (research-fixes Task 05)
  eval_profile: comparison       # 'comparison' = apply ONE shared filter to all methods before
                                 #   the pixel-IoU / PQ metrics (fair head-to-head); 'paper' =
                                 #   pass labels through (each method keeps its own filtering).
                                 #   The point-based paper-protocol headline is always faithful.
  eval_min_room_area_m2: 1.0     # one area threshold applied to every method (comparison profile)
  eval_min_coverage_frac: 0.25   # one void rule (interior coverage frac) applied to every method
                                 # The canonical wall scaffold = cleaned slab-occupancy wall_mask
                                 # (scan2bim.eval_wall_scaffold), shared by GT + all predictions.
